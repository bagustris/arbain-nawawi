<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <header class="mobile-header" role="banner">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation" aria-controls="book-sidebar" aria-expanded="false">&#9776;</button>
      <a class="mobile-site-title" href="{{ "/" | relative_url }}">{{ site.title | default: "Home" }}</a>
    </header>

    <div class="book-layout">
      <nav class="book-sidebar" id="book-sidebar">
        <div class="book-sidebar-header">
          <a href="{{ "/" | relative_url }}">{{ site.title | default: "Home" }}</a>
        </div>

        <div class="sidebar-search">
          <input type="text" id="search-input" placeholder="Search hadith..." aria-label="Search hadith" />
          <div id="search-results" style="display: none;">
            <div id="search-results-list"></div>
          </div>
        </div>

        <div class="book-nav">
          {% include sidebar-nav.html %}
        </div>
      </nav>

      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <main class="book-content">
        <div class="book-content-inner markdown-body">
          {{ content }}

          {% if site.github.private != true %}
          <div class="footer border-top border-gray-light mt-5 pt-3 text-right text-gray">
            <a href="{{ '/' | relative_url }}">Back to top</a>
          </div>
          {% endif %}
        </div>
      </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js" integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
    <script>anchors.add();</script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js" integrity="sha512-4xUl/d6D6THrAnXAwGajXkoWaeMNwEKK4iNfq5DotEbLPAfk6FSxSP3ydNxqDgCw1c/0Z1Jg6L8h2j+++9BZmg==" crossorigin="anonymous"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var toggle = document.getElementById('sidebar-toggle');
        var sidebar = document.getElementById('book-sidebar');
        var overlay = document.getElementById('sidebar-overlay');

        function closeSidebar() {
          sidebar.classList.remove('is-open');
          overlay.style.display = 'none';
          toggle.setAttribute('aria-expanded', 'false');
        }

        toggle.addEventListener('click', function() {
          var isOpen = sidebar.classList.toggle('is-open');
          overlay.style.display = isOpen ? 'block' : 'none';
          toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        });

        overlay.addEventListener('click', closeSidebar);

        sidebar.querySelectorAll('a').forEach(function(link) {
          link.addEventListener('click', function() {
            if (window.innerWidth <= 768) {
              closeSidebar();
            }
          });
        });

        var searchInput = document.getElementById('search-input');
        var searchResults = document.getElementById('search-results');
        var searchResultsList = document.getElementById('search-results-list');
        var searchIndex;
        var searchData;

        fetch('{{ "/assets/search.json" | relative_url }}')
          .then(function(response) { return response.json(); })
          .then(function(data) {
            searchData = data;

            searchIndex = lunr(function() {
              this.ref('id');
              this.field('title', { boost: 10 });
              this.field('content');
              this.field('excerpt');
              this.field('categories');
              this.field('tags');

              data.forEach(function(doc, idx) {
                doc.id = idx;
                this.add(doc);
              }, this);
            });
          })
          .catch(function(error) {
            console.error('Error loading search data:', error);
          });

        searchInput.addEventListener('input', function() {
          var query = this.value.trim();

          if (query.length < 2) {
            searchResults.style.display = 'none';
            return;
          }

          if (!searchIndex) {
            searchResultsList.innerHTML = '<p>Search index is loading...</p>';
            searchResults.style.display = 'block';
            return;
          }

          try {
            displaySearchResults(searchIndex.search(query), query);
          } catch (error) {
            console.error('Search error:', error);
            searchResultsList.innerHTML = '<p>Search error occurred.</p>';
            searchResults.style.display = 'block';
          }
        });

        function displaySearchResults(results, query) {
          if (results.length === 0) {
            searchResultsList.innerHTML = '<p>No results found for "' + query + '"</p>';
          } else {
            var html = '';
            results.slice(0, 10).forEach(function(result) {
              var item = searchData[result.ref];
              html += '<div class="search-result-item mb-3 pb-3 border-bottom">';
              html += '<h5><a href="' + item.url + '">' + item.title + '</a></h5>';
              if (item.excerpt) {
                html += '<p class="text-gray">' + item.excerpt + '</p>';
              }
              html += '<small class="text-gray">Score: ' + result.score.toFixed(2) + '</small>';
              html += '</div>';
            });
            searchResultsList.innerHTML = html;
          }
          searchResults.style.display = 'block';
        }

        document.addEventListener('click', function(event) {
          if (!searchResults.contains(event.target) && event.target !== searchInput) {
            searchResults.style.display = 'none';
          }
        });
      });
    </script>
  </body>
</html>
